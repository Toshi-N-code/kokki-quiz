<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://flagcdn.com data:; script-src 'self'; style-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#ffd86b">
  <title>こっきクイズ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <!-- ホーム画面 -->
    <section class="home-screen" id="home-screen" aria-labelledby="home-title">
      <div class="home-content">
        <h1 class="title-home" id="home-title">こっきクイズ</h1>
        <p class="home-sub">あそびかたを えらんでね</p>

        <button type="button" id="start-all-btn" class="btn btn-start btn-start-all">
          <span class="start-emoji" aria-hidden="true">🌍</span>
          <span class="start-text">
            <span class="start-line1">スタート</span>
            <span class="start-line2">ぜんぶ・<span id="home-all-count">…</span>もん</span>
          </span>
        </button>

        <button type="button" id="start-review-btn" class="btn btn-start btn-start-review" disabled>
          <span class="start-emoji" aria-hidden="true">📖</span>
          <span class="start-text">
            <span class="start-line1">スタート</span>
            <span class="start-line2">ふくしゅう・<span id="home-review-count">0</span>もん</span>
          </span>
        </button>

        <p class="home-hint" id="home-review-hint">「もういちど」を おしたくにが ここに たまるよ</p>
      </div>
    </section>

    <!-- クイズ画面 -->
    <div class="quiz-screen" id="quiz-screen" hidden>
    <header class="header">
      <button type="button" id="home-btn" class="home-btn" aria-label="ホームへ もどる">
        <span aria-hidden="true">←</span> ホーム
      </button>
      <h1 class="title">こっきクイズ</h1>
      <nav class="tabs" role="tablist" aria-label="モードきりかえ">
        <button type="button" id="tab-all" class="tab is-active" role="tab" aria-selected="true" data-mode="all">ぜんぶ</button>
        <button type="button" id="tab-review" class="tab" role="tab" aria-selected="false" data-mode="review" disabled>ふくしゅう <span class="badge" id="review-badge">0</span></button>
      </nav>
    </header>

    <section class="flag-area" aria-live="polite">
      <div class="flag-frame">
        <img id="flag" class="flag" alt="こっき" decoding="async">
        <div id="flag-fallback" class="flag-fallback" hidden>こっきを よみこめませんでした</div>
      </div>
    </section>

    <section class="answer-area" id="answer-area" hidden>
      <div class="answer-row">
        <span class="answer-label">くに</span>
        <span class="answer-text" id="country-name"></span>
      </div>
      <div class="answer-row">
        <span class="answer-label">しゅと</span>
        <span class="answer-text" id="capital-name"></span>
      </div>
      <div class="answer-row">
        <span class="answer-label">ちいき</span>
        <span class="answer-text answer-text-sub" id="region-name"></span>
      </div>
      <div class="map-area" id="map-area" aria-label="せかいちず"></div>
    </section>

    <section class="controls">
      <button type="button" id="reveal-btn" class="btn btn-primary">こたえは？</button>
      <div class="judgment-row" id="judgment-row" hidden>
        <button type="button" id="known-btn" class="btn btn-known">
          <span class="btn-icon" aria-hidden="true">◯</span>
          <span class="btn-label">わかった！</span>
        </button>
        <button type="button" id="again-btn" class="btn btn-again">
          <span class="btn-icon" aria-hidden="true">？</span>
          <span class="btn-label">もういちど</span>
        </button>
      </div>
    </section>
    </div><!-- /.quiz-screen -->

    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <div class="celebrate" id="celebrate" role="dialog" aria-modal="true" aria-labelledby="celebrate-msg" hidden>
      <div class="celebrate-card">
        <div class="celebrate-emoji" aria-hidden="true">🎉</div>
        <p class="celebrate-msg" id="celebrate-msg">すごい！<br>ぜんぶ おぼえたね！</p>
        <button type="button" id="celebrate-close" class="btn btn-primary">もどる</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
